name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
        ansible-core-version: ['2.14', '2.15', '2.16', '2.17']
        exclude:
          # ansible-core >= 2.17 requires Python >= 3.10
          - python-version: '3.9'
            ansible-core-version: '2.17'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: requirements-test.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "ansible-core~=${{ matrix.ansible-core-version }}.0"
        pip install -r requirements-test.txt

    - name: Lint with flake8 (fatal errors only)
      run: flake8 jailexec.py --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test with pytest
      run: pytest --cov=jailexec --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install quality tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8
        pip install -r requirements-test.txt

    - name: Check code formatting with Black
      run: black --check --diff jailexec.py tests/

    - name: Check import sorting with isort
      run: isort --check-only --diff jailexec.py tests/

    - name: Style check with flake8
      run: flake8 jailexec.py --max-line-length=100 --extend-ignore=E203,W503

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit
      run: bandit -r jailexec.py
